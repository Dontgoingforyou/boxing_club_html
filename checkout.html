<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Оформление заказа — California Boxing Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;1,400&family=Manrope:wght@400;500;600;700;800&family=Montserrat:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="top-bar__inner">
        <button
          type="button"
          class="icon-btn top-bar__menu"
          aria-expanded="false"
          aria-controls="drawer"
          aria-label="Меню"
        >
          <svg class="top-bar__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3.75 5h16.5M3.75 12h16.5M3.75 19h16.5" />
          </svg>
        </button>
        <div class="top-bar__actions">
          <button type="button" class="icon-btn" aria-label="Поиск">
            <svg class="top-bar__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
          </button>
          <a href="#" class="icon-btn" id="nav-favorites" aria-label="Избранное">
            <svg class="top-bar__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z" />
            </svg>
          </a>
          <a href="#" class="icon-btn" aria-label="Корзина">
            <svg class="top-bar__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974a1.125 1.125 0 0 1 1.119 1.007Z" />
            </svg>
          </a>
          <a href="#" class="icon-btn" aria-label="Личный кабинет">
            <svg class="top-bar__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
          </a>
        </div>
      </div>
    </header>

    <div class="drawer" id="drawer" hidden>
      <div class="drawer__backdrop" data-close-drawer tabindex="-1" aria-hidden="true"></div>
      <nav class="drawer__panel" aria-label="Меню">
        <a href="index.html">Главная</a>
        <a href="index.html#catalog">Каталог</a>
        <a href="index.html#about">О клубе</a>
        <a href="index.html#footer">Контакты</a>
      </nav>
    </div>

    <main class="page page--product">
      <div class="container container--wide" style="padding-top: 0">
        <p style="margin-bottom: 1.5rem">
          <a href="product.html" style="color: var(--text-muted); font-size: 15px">← Вернуться к товару</a>
        </p>
        <h1 class="product-detail__title" style="margin-bottom: 12px">Оформление заказа</h1>
        <p style="color: rgba(249, 249, 249, 0.78); max-width: 36rem; line-height: 1.6">
          Здесь будет корзина и оплата. Пока заглушка: цель потока — как можно меньше шагов до покупки.
        </p>
      </div>
    </main>

    <script src="js/favorites.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
